    // 2. 모델 상대 피처 연산 및 분류 기준 매핑
    function calcRelFeatures(horses) {
      const avg = arr => arr.reduce((a,b) => a+b, 0) / arr.length;
      
      const avgTop3 = avg(horses.map(h => h.top3_rate_last_5));
      const avgJockey = avg(horses.map(h => h.jockey_rate));
      const avgTrainer = avg(horses.map(h => h.trainer_rate));
      const avgOdds = avg(horses.map(h => h.odds));
      
      return horses.map(h => {
        const synergy = h.jockey_rate * h.trainer_rate;
        const is_peak = (h.weight_diff >= 0 && h.weight_diff <= 5 &&
                         h.days_rest >= 21 && h.days_rest <= 42) ? 1 : 0;
        
        // 상대 피처
        const rel_top3 = h.top3_rate_last_5 - avgTop3;
        const rel_jockey = h.jockey_rate - avgJockey;
        const rel_synergy = synergy - avg(horses.map(x => x.jockey_rate * x.trainer_rate));
        
        // 피크폼 지수
        const rank_fill = h.avg_rank_last_3 ?? 7;
        const gap_fill = h.avg_gap_last_3 ?? 3.0;
        const peak_form_index = 1 / ((rank_fill * gap_fill) + 1);
        
        // 다크호스 점수
        const dark_horse_score = (h.odds / 10.0) * h.top3_rate_last_5;
        
        // LightGBM 근사 점수
        let score = 0;
        score += rel_top3 * 2.5;
        score += rel_jockey * 2.0;
        score += rel_synergy * 1.8;
        score += peak_form_index * 1.5;
        score += is_peak * 0.4;
        score += dark_horse_score * 0.3;
        score += (h.is_debut ? -0.4 : 0.1);
        
        const prob = 1 / (1 + Math.exp(-score));
        
        // EV 계산
        const ev = (prob * h.odds) - (1 - prob);
        
        // 방향별 추천 여부
        const recallFlag = prob >= 0.30;
        const precisionFlag = prob >= 0.70;
        const evFlag = ev > 0;
        
        // 켈리 기준
        const b = h.odds - 1;
        const kelly = Math.max(0, (b * prob - (1 - prob)) / b);
        
        return {
          ...h, synergy, is_peak, peak_form_index,
          dark_horse_score, prob: prob * 100, ev,
          recallFlag, precisionFlag, evFlag, kelly
        };
      });
    }

    // 4. 메인 앱 컴포넌트
    function App() {
      const [selectedRaceId, setSelectedRaceId] = useState(RACES[0].id);
      const [activeTab, setActiveTab] = useState("A");
      const [betBudget, setBetBudget] = useState(50000);
      const [breakEvenHorseName, setBreakEvenHorseName] = useState("");

      // 현재 경주 데이터 로드 및 피처 계산
      const currentRace = useMemo(() => {
        return RACES.find(r => r.id === selectedRaceId);
      }, [selectedRaceId]);

      const calculatedHorses = useMemo(() => {
        if (!currentRace) return [];
        const processed = calcRelFeatures(currentRace.horses);
        // 확률순 정렬
        return processed.sort((a, b) => b.prob - a.prob);
      }, [currentRace]);

      // 1번 인기마 (최저 배당률)
      const favoriteHorse = useMemo(() => {
        if (calculatedHorses.length === 0) return null;
        return [...calculatedHorses].sort((a,b) => a.odds - b.odds)[0];
      }, [calculatedHorses]);

      // 다크호스 후보 탐지: 배당률 >= 30 이고 예측확률 >= 35%
      const darkHorses = useMemo(() => {
        return calculatedHorses.filter(h => h.odds >= 30 && h.prob >= 35);
      }, [calculatedHorses]);

      // 포트폴리오용 다크호스 후보: 방향 A(Recall) ∩ 방향 C(EV) 교집합 & 배당률 >= 10
      const portfolioDarkHorses = useMemo(() => {
        return calculatedHorses.filter(h => h.recallFlag && h.evFlag && h.odds >= 10);
      }, [calculatedHorses]);

      // 이변 확률 계산 (다습/포화 트랙 감지 기반 기본값 설정)
      const upsetProbability = useMemo(() => {
        if (!currentRace) return "낮음";
        if (currentRace.track.includes("포화") || currentRace.track.includes("불량")) return "매우 높음 (38%)";
        if (currentRace.track.includes("다습")) return "높음 (24%)";
        return "보통 (12%)";
      }, [currentRace]);

      // 손익분기 역산용 말 선택 기본 설정
      useEffect(() => {
        if (calculatedHorses.length > 0) {
          setBreakEvenHorseName(calculatedHorses[0].name);
        }
      }, [calculatedHorses]);

      const breakEvenHorse = useMemo(() => {
        return calculatedHorses.find(h => h.name === breakEvenHorseName);
      }, [breakEvenHorseName, calculatedHorses]);

      // 3방향 모델 결과 분리
      const directionA_Recall = useMemo(() => {
        return calculatedHorses.filter(h => h.recallFlag).slice(0, 3);
      }, [calculatedHorses]);

                                  {h.precisionFlag ? <span class="text-emerald font-extrabold text-sm">✓</span> : <span class="text-slate-600 text-xs">✕</span>}
                                </td>
                                <td class="py-4 px-5 text-center bg-amber-900/5">
                                  {h.evFlag ? <span class="text-warning font-extrabold text-sm">✓</span> : <span class="text-slate-600 text-xs">✕</span>}
                                </td>
                                <td class="py-4 px-5 text-right font-mono font-extrabold">
                                  {expectedProfit > 0 ? (
                                    <span class="text-emerald">+{Math.round(expectedProfit).toLocaleString()}원</span>
                                  ) : (
                                    <span class="text-red-400">{Math.round(expectedProfit).toLocaleString()}원</span>
                                  )}
                                </td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>
                    </div>
                  </div>

                </div>
              )}

              {/* View C — 포트폴리오 탭 */}
              {activeTab === 'C' && (
                <div class="flex flex-col gap-6">
                  
                  {/* 베팅 금액 슬라이더 */}
                  <div class="glassmorphism p-5 rounded-xl border border-navy-800 shadow-xl flex flex-col md:flex-row justify-between items-center gap-4">
                    <div class="w-full md:w-1/3 text-center md:text-left">
                      <span class="text-xs font-semibold text-slate-400">시뮬레이션 가용 투자금</span>
                      <div class="text-3xl font-black text-gold mt-1 font-mono">{betBudget.toLocaleString()}원</div>
                    </div>
                    <div class="w-full md:w-2/3 flex items-center gap-4">
                      <span class="text-xs font-mono text-slate-400">5,000원</span>
                      <input 
                        type="range" 
                        min="5000" 
                        max="100000" 
                        step="5000" 
                        value={betBudget} 
                        onChange={(e) => setBetBudget(Number(e.target.value))}
                        class="flex-grow h-2 bg-navy-950 rounded-lg appearance-none cursor-pointer accent-gold"
                      />
                      <span class="text-xs font-mono text-slate-400">100,000원</span>
                    </div>
                  </div>

                  {/* 포트폴리오 시나리오 3종 */}
                  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    
                    {/* 안정형 포트폴리오 */}
                    <div class="glassmorphism rounded-xl p-5 border-t-4 border-t-emerald-500 shadow-xl flex flex-col justify-between gap-4">
                      <div>
                        <div class="flex justify-between items-center">
                          <h4 class="text-sm font-black text-emerald-400 uppercase tracking-wider">안정형 포트폴리오</h4>
                          <span class="bg-emerald/20 text-emerald text-[9px] px-1.5 py-0.5 rounded font-bold">로리스크</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">방향 B(Precision 70%) 충족 추천마 대상 단승식 집중 분산 투자</p>
                      </div>

                      <div class="flex-grow flex flex-col gap-2.5 my-2">
                        {directionB_Precision.length > 0 ? (
                          directionB_Precision.map(h => {
                            const alloc = betBudget / directionB_Precision.length;
                            return (
                              <div key={h.name} class="bg-navy-950/60 p-2.5 rounded-lg border border-navy-800 text-xs">
                                <div class="flex justify-between font-bold text-slate-200">
                                  <span>{h.name} (단승)</span>
                                  <span class="text-gold font-mono">{h.odds.toFixed(1)}배</span>
                                </div>
                                <div class="flex justify-between text-slate-400 mt-1.5 text-[11px]">
                                  <span>배분액: {Math.round(alloc).toLocaleString()}원</span>
                                  <span class="text-emerald font-semibold font-mono">적중시: {Math.round(alloc * h.odds).toLocaleString()}원</span>
                                </div>
                                <div class="text-[10px] text-slate-500 mt-1 text-right">
                                  손익분기 배당: {(100 / h.prob).toFixed(1)}배
                                </div>
                              </div>
                            );
                          })
                        ) : (
                          <div class="bg-navy-950/80 p-4 rounded-lg border border-navy-800 text-center text-xs text-slate-500 flex flex-col gap-2">
                            <span>Precision 충족 조건 부재</span>
                            <span class="text-[10px] text-slate-400">대안: 1순위 예측마 {calculatedHorses[0]?.name} 단승 올인</span>
                            <div class="bg-navy-900 p-2 rounded text-left mt-2">
                              <div class="flex justify-between font-bold text-slate-200">
                                <span>{calculatedHorses[0]?.name}</span>
                                <span class="text-gold">{calculatedHorses[0]?.odds}배</span>
                              </div>
                              <div class="flex justify-between items-center mt-1.5 text-[11px]">
                                <span class="text-slate-400">손익분기 배당: {(100 / (calculatedHorses[0]?.prob || 1)).toFixed(1)}배</span>
                                <span class="text-emerald font-semibold font-mono">적중시: {Math.round(betBudget * calculatedHorses[0]?.odds).toLocaleString()}원</span>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>

                      <div class="text-[10px] text-slate-400 pt-3 border-t border-navy-800">
                        손익분기 최소 요건: 배당 {(100 / (calculatedHorses[0]?.prob || 1)).toFixed(1)}배 이상 유지
                      </div>
                    </div>

                    {/* 다크호스 포트폴리오 */}
                    <div class="glassmorphism rounded-xl p-5 border-t-4 border-t-blue-500 shadow-xl flex flex-col justify-between gap-4">
                      <div>
                        <div class="flex justify-between items-center">
                          <h4 class="text-sm font-black text-blue-400 uppercase tracking-wider">다크호스 포트폴리오</h4>
                          <span class="bg-blue-500/20 text-blue-400 text-[9px] px-1.5 py-0.5 rounded font-bold">하이리턴</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">방향 A(Recall) ∩ 방향 C(EV) 교집합 마필 대상 소액 분산 포지션</p>
                      </div>

                      <div class="flex-grow flex flex-col gap-2.5 my-2">
                        {portfolioDarkHorses.length > 0 ? (
                          portfolioDarkHorses.map(h => {
                            const alloc = betBudget / portfolioDarkHorses.length;
                            return (
                              <div key={h.name} class="bg-navy-950/60 p-2.5 rounded-lg border border-navy-800 text-xs">
                                <div class="flex justify-between font-bold text-slate-200">
                                  <span>{h.name} (단승)</span>
                                  <span class="text-gold font-mono">{h.odds.toFixed(1)}배</span>
                                </div>
                                <div class="flex justify-between text-slate-400 mt-1.5 text-[11px]">
                                  <span>배분액: {Math.round(alloc).toLocaleString()}원</span>
                                  <span class="text-blue-400 font-semibold font-mono">적중시: {Math.round(alloc * h.odds).toLocaleString()}원</span>
                                </div>
                              </div>
                            );
                          })
                        ) : (
                          <div class="text-xs text-slate-500 text-center py-6">교집합 고배당 조건 부재 (단거리 위주 인기 정배 발생)</div>
                        )}
                      </div>

                      <div class="pt-3 border-t border-navy-800 text-xs flex flex-col gap-1">
                        {portfolioDarkHorses.length > 0 && (
                          <div class="text-blue-400 font-bold">
                            예상 최대수익: {Math.round(Math.max(...portfolioDarkHorses.map(h => (betBudget / portfolioDarkHorses.length) * h.odds)) - betBudget).toLocaleString()}원
                          </div>
                        )}
                        <div class="text-[10px] text-slate-400">
                          주의: 고배당 베팅은 환수율 분산으로 소액 투자 권장
                        </div>
                      </div>
                    </div>

                    {/* 켈리 기준 포트폴리오 */}
                    <div class="glassmorphism rounded-xl p-5 border-t-4 border-t-warning shadow-xl flex flex-col justify-between gap-4">
                      <div>
                        <div class="flex justify-between items-center">
                          <h4 class="text-sm font-black text-warning uppercase tracking-wider">켈리 기준 포트폴리오</h4>
                          <span class="bg-amber-500/20 text-warning text-[9px] px-1.5 py-0.5 rounded font-bold">수학적 최적화</span>
                        </div>
                        <p class="text-xs text-slate-400 mt-2">공식 (bp - q) / b에 기반한 수학적 환수율 최적 배분</p>
                      </div>

                      <div class="flex-grow my-2">
                        {kellyAllocations.length > 0 ? (
                          <div class="overflow-x-auto">
                            <table class="w-full text-left text-xs border-collapse">
                              <thead>
                                <tr class="text-slate-400 border-b border-navy-800 text-[10px] uppercase font-bold">
                                  <th class="pb-2">마필명</th>
                                  <th class="pb-2 text-center">비율</th>
                                  <th class="pb-2 text-right">권장배팅</th>
                                  <th class="pb-2 text-right">적중예상</th>
                                </tr>
                              </thead>
                              <tbody class="divide-y divide-navy-800/40">
                                {kellyAllocations.slice(0, 3).map(h => (
                                  <tr key={h.name} class="hover:bg-navy-800/20">
                                    <td class="py-2.5 font-bold text-slate-200">{h.name}</td>
                                    <td class="py-2.5 text-center font-mono text-warning font-semibold">{(h.ratio * 100).toFixed(0)}%</td>
                                    <td class="py-2.5 text-right font-mono text-slate-300">{h.amount.toLocaleString()}원</td>
                                    <td class="py-2.5 text-right font-mono text-gold font-bold">{Math.round(h.amount * h.odds).toLocaleString()}원</td>
                                  </tr>
                                ))}
                              </tbody>
                            </table>
                          </div>
                        ) : (
                          <div class="text-xs text-slate-500 text-center py-6">EV 양수 마필 부재로 배분값이 산출되지 않습니다.</div>
                        )}
                      </div>

                      <div class="text-[10px] text-slate-400 pt-3 border-t border-navy-800">
                        공식 설명: b=배당률-1, p=확률, q=실패율
                      </div>
                    </div>

                  </div>

                  {/* 조합 베팅 기대수익 및 손익분기 분석 */}
                  <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    
                    {/* 조합 베팅 기대수익 테이블 */}
                    {(() => {
                      const h0 = calculatedHorses[0];
                      const h1 = calculatedHorses[1];
                      if (!h0) return null;

                      // 단승
                      const oddsWin = h0.odds || 0;
                      const probWin = h0.prob || 0;
                      const breakEvenWin = 100 / (probWin || 1);
                      const evWin = (probWin/100 * oddsWin) - (1 - probWin/100);
                      const profitWin = evWin * betBudget;

                      // 연승
                      const oddsPlace = 1 + (h0.odds - 1) * 0.35;
                      const probPlace = Math.min(95, probWin * 1.5);
                      const breakEvenPlace = 100 / (probPlace || 1);
                      const evPlace = (probPlace/100 * oddsPlace) - (1 - probPlace/100);
                      const profitPlace = evPlace * betBudget;

                      // 복승
                      const oddsQuin = h1 ? (h0.odds * h1.odds) / 2.8 : 0;
                      const probQuin = h1 ? (probWin/100 * h1.prob/100) * 1.2 * 100 : 0;
                      const breakEvenQuin = 100 / (probQuin || 1);
                      const evQuin = (probQuin/100 * oddsQuin) - (1 - probQuin/100);
                      const profitQuin = evQuin * betBudget;

                      return (
                        <div class="glassmorphism rounded-xl border border-navy-800 overflow-hidden shadow-xl">
                          <div class="p-4 bg-navy-900/40 border-b border-navy-800">
                            <h4 class="text-sm font-bold text-slate-200">베팅 승식 조합별 예상 가치</h4>
                          </div>
                          <div class="p-4">
                            <div class="overflow-x-auto custom-scrollbar">
                              <table class="w-full text-left text-xs border-collapse">
                                <thead>
                                  <tr class="text-slate-400 border-b border-navy-800 pb-2">
                                    <th class="pb-2">베팅 유형</th>
                                    <th class="pb-2">대상마</th>
                                    <th class="pb-2 text-right">환산 배당</th>
                                    <th class="pb-2 text-right">적중 확률</th>
                                    <th class="pb-2 text-right">손익분기</th>
                                    <th class="pb-2 text-right">기대 수익 (EV)</th>
                                  </tr>
                                </thead>
                                <tbody class="divide-y divide-navy-800/40">
                                  {/* 단승 */}
                                  <tr class={`transition-colors ${evWin > 0 ? 'bg-emerald-950/30 border-l-4 border-l-emerald-500' : 'hover:bg-navy-800/20'}`}>
                                    <td class="py-3 px-2 font-bold text-slate-200">단승 (Win)</td>
                                    <td class="py-3 px-2">{h0.name}</td>
                                    <td class="py-3 px-2 text-right font-mono font-bold text-gold">{oddsWin.toFixed(1)}배</td>
                                    <td class="py-3 px-2 text-right font-mono">{probWin.toFixed(1)}%</td>
                                    <td class="py-3 px-2 text-right font-mono text-slate-400">{breakEvenWin.toFixed(1)}배</td>
                                    <td class={`py-3 px-2 text-right font-mono font-bold ${profitWin > 0 ? 'text-emerald' : 'text-red-400'}`}>
                                      {profitWin > 0 ? `+${Math.round(profitWin).toLocaleString()}원` : `${Math.round(profitWin).toLocaleString()}원`}
                                    </td>
                                  </tr>
                                  {/* 연승 */}
                                  <tr class={`transition-colors ${evPlace > 0 ? 'bg-emerald-950/30 border-l-4 border-l-emerald-500' : 'hover:bg-navy-800/20'}`}>
                                    <td class="py-3 px-2 font-bold text-slate-200">연승 (Place)</td>
                                    <td class="py-3 px-2">{h0.name}</td>
                                    <td class="py-3 px-2 text-right font-mono font-bold text-gold">{oddsPlace.toFixed(1)}배</td>
                                    <td class="py-3 px-2 text-right font-mono">{probPlace.toFixed(1)}%</td>
                                    <td class="py-3 px-2 text-right font-mono text-slate-400">{breakEvenPlace.toFixed(1)}배</td>
                                    <td class={`py-3 px-2 text-right font-mono font-bold ${profitPlace > 0 ? 'text-emerald' : 'text-red-400'}`}>
                                      {profitPlace > 0 ? `+${Math.round(profitPlace).toLocaleString()}원` : `${Math.round(profitPlace).toLocaleString()}원`}
                                    </td>
                                  </tr>
                                  {/* 복승 */}
                                  {h1 && (
                                    <tr class={`transition-colors ${evQuin > 0 ? 'bg-emerald-950/30 border-l-4 border-l-emerald-500' : 'hover:bg-navy-800/20'}`}>
                                      <td class="py-3 px-2 font-bold text-slate-200">복승 (Quinella)</td>
                                      <td class="py-3 px-2">{h0.name} + {h1.name}</td>
                                      <td class="py-3 px-2 text-right font-mono font-bold text-gold">{oddsQuin.toFixed(1)}배</td>
                                      <td class="py-3 px-2 text-right font-mono">{probQuin.toFixed(1)}%</td>
                                      <td class="py-3 px-2 text-right font-mono text-slate-400">{breakEvenQuin.toFixed(1)}배</td>
                                      <td class={`py-3 px-2 text-right font-mono font-bold ${profitQuin > 0 ? 'text-emerald' : 'text-red-400'}`}>
                                        {profitQuin > 0 ? `+${Math.round(profitQuin).toLocaleString()}원` : `${Math.round(profitQuin).toLocaleString()}원`}
                                      </td>
                                    </tr>
                                  )}
                                </tbody>
                              </table>
                            </div>
                          </div>
                        </div>
                      );
                    })()}

                    {/* 손익분기 역산 표시 */}
                    <div class="glassmorphism rounded-xl border border-navy-800 p-5 shadow-xl flex flex-col justify-between">
                      <div>
                        <h4 class="text-sm font-bold text-slate-200">마필별 개별 손익분기점 역산 (Break-Even)</h4>
                        <p class="text-xs text-slate-400 mt-1">예측 확률 기준, 장기 베팅 시 수익(EV &gt; 0)을 내기 위한 최소 배당률 조건</p>
                      </div>

                      <div class="my-4">
                        <label class="text-[10px] text-slate-400 font-bold uppercase tracking-wider block mb-1">분석 대상 마필</label>
                        <select 
                          value={breakEvenHorseName} 
                          onChange={(e) => setBreakEvenHorseName(e.target.value)}
                          class="w-full bg-navy-950 border border-navy-800 text-slate-200 px-3 py-2 rounded text-xs font-bold focus:outline-none focus:ring-1 focus:ring-gold"
                        >
                          {calculatedHorses.map(h => (
                            <option key={h.name} value={h.name}>{h.name}</option>
                          ))}
                        </select>
                      </div>

                      {breakEvenHorse && (
                        <div class="flex flex-col gap-3">
                          <div class="text-xs text-slate-300 font-bold mb-1">
                            📢 이 말이 이기려면 배당률이 최소 {(100 / breakEvenHorse.prob).toFixed(1)}배 이상이어야 합니다. (현재 시장 배당: {breakEvenHorse.odds.toFixed(1)}배)
                          </div>
                          
                          <div class="flex justify-between items-center text-xs">
                            <span class="text-slate-400">현재 시장 배당률</span>
                            <span class="font-black text-gold">{breakEvenHorse.odds.toFixed(1)}배</span>
                          </div>
                          <div class="flex justify-between items-center text-xs">
                            <span class="text-slate-400">AI 손익분기 배당률</span>
                            <span class="font-black text-emerald">{(100 / breakEvenHorse.prob).toFixed(1)}배</span>
                          </div>

                          {/* 비교 바 */}
                          <div class="mt-2">
                            <div class="flex justify-between text-[9px] text-slate-400 mb-1">
                              <span>0배</span>
                              <span>손익분기 ({(100 / breakEvenHorse.prob).toFixed(1)}배)</span>
                              <span>최대</span>
                            </div>
                            <div class="w-full h-3 bg-navy-950 rounded overflow-hidden relative border border-navy-800">
                              {/* 현재 배당 마커 */}
                              <div 
                                class="h-full bg-gold absolute top-0 left-0"
                                style={{ width: `${Math.min(100, (breakEvenHorse.odds / (100 / breakEvenHorse.prob * 1.5)) * 100)}%` }}
                              ></div>
                              {/* 손익분기 지점 표시 선 */}
                              <div 
                                class="absolute top-0 bottom-0 w-0.5 bg-emerald-500 z-10"
                                style={{ left: `${(100 / breakEvenHorse.prob / (100 / breakEvenHorse.prob * 1.5)) * 100}%` }}
                              ></div>
                            </div>
                          </div>

                          <div class="bg-navy-950/60 p-2.5 rounded border border-navy-800/80 text-[11px] mt-2">
                            {breakEvenHorse.odds >= (100 / breakEvenHorse.prob) ? (
                              <span class="text-emerald font-semibold">✓ 현재 배당률이 AI 손익분기를 초과합니다. 베팅 시 장기적으로 수익이 누적됩니다.</span>
                            ) : (
                              <span class="text-red-400 font-semibold">✕ 현재 배당률이 AI 손익분기 미만입니다. 베팅 시 장기적으로 손실을 입게 됩니다.</span>
                            )}
                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                </div>
              )}

            </div>

          </main>

          {/* Footer 영역 */}
          <footer class="border-t border-navy-800 bg-navy-900/60 py-6 mt-12">
            <div class="max-w-7xl mx-auto px-4 text-center flex flex-col md:flex-row justify-between items-center gap-4 text-xs text-navy-600">
              <p>© 2026 KRA AI 경마 의사결정 대시보드. All rights reserved.</p>
              <div class="flex gap-4">
                <span>데이터 소스: 한국마사회(KRA) 3개년 공공데이터</span>
                <span>모형 알고리즘: LightGBM v4.3.0</span>
              </div>
            </div>
          </footer>

        </div>
      );
    }

    // React 18 렌더링
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
